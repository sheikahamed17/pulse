name = "pulse"
main = ".open-next/worker.js"
compatibility_date = "2026-06-15"
compatibility_flags = ["nodejs_compat"]

# Static assets bundled by OpenNext. The binding "ASSETS" is what the
# OpenNext worker uses internally to serve them. The directory matches
# what OpenNext writes during `pnpm cf:build` (.open-next/assets).
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "pulse"
database_id = "df509c20-ed81-4146-941f-6e48e7f1f925"

[observability]
enabled = true

[triggers]
# Phase 1.4: daily recurring-rules materializer
# 02:00 UTC every day (low-traffic window globally).
# Per-user time-zone sharding deferred to Phase 2.
crons = ["0 2 * * *"]

# Local-dev notes:
# - `pnpm exec wrangler dev` uses --persist by default for D1 (file under .wrangler/)
# - `pnpm exec wrangler d1 execute pulse --remote ...` writes to the cloud DB
