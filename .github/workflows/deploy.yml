name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # No `version:` here — pnpm/action-setup@v4 reads the version from
        # package.json's `packageManager` field. Specifying both causes
        # "Multiple versions of pnpm specified" error.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build for Cloudflare (Next.js + OpenNext)
        run: pnpm cf:build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # `wrangler deploy` reads .open-next/worker.js + .open-next/assets/
          # which were produced by the previous step.
          command: deploy

      - name: Apply D1 migrations (idempotent)
        # Allowed to fail without blocking the deploy. The default
        # "Edit Cloudflare Workers" API token template does not include
        # D1:Edit permission, so this step errors with `code: 10000`
        # Authentication error until the token is regenerated with both
        # Workers and D1 scopes. Phase 0 migrations are applied manually
        # via `wrangler d1 execute --remote` from a logged-in dev machine.
        # When the token is upgraded, this step will start succeeding
        # without any workflow change.
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute pulse --remote --file=migrations/0001_initial.sql

      - name: Apply D1 migrations — Phase 1 (idempotent)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute pulse --remote --file=migrations/0002_phase_1_money.sql
